<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Razer Wolverine V3 Pro - Controller Viewer Test</title>
        <link rel="stylesheet" href="styles.css">
        <style>
        body {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .container {
            text-align: center;
            padding: 20px;
        }
        
        h1 {
            color: #44D62C;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(68, 214, 44, 0.5);
        }
        
        .status {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 8px;
            margin: 20px 0;
            color: #fff;
        }
        
        .status.connected {
            background: rgba(68, 214, 44, 0.2);
            border: 2px solid #44D62C;
        }
        
        .status.disconnected {
            background: rgba(231, 76, 60, 0.2);
            border: 2px solid #E74C3C;
        }
        
        #controller-viewer {
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 15px;
            margin: 20px 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            background: #44D62C;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        button:hover {
            background: #7FD157;
            transform: scale(1.05);
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .info-panel {
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            max-width: 500px;
            text-align: left;
            color: #ccc;
        }
        
        .button-state {
            display: inline-block;
            padding: 3px 8px;
            margin: 2px;
            background: rgba(68, 214, 44, 0.2);
            border-radius: 3px;
            font-size: 12px;
        }
        
        .stick-values {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin: 5px 0;
        }
    </style>
    </head>
    <body>
        <div class="container">
            <h1>🎮 Razer Wolverine V3 Pro Controller Test</h1>

            <div id="status" class="status disconnected">
                <strong>Status:</strong> <span id="status-text">No controller
                    detected</span>
            </div>

            <div id="controller-viewer">
                <object data="controller-layout.svg" type="image/svg+xml"
                    id="controller-svg" width="1500" height="900">
                    Your browser doesn't support SVG
                </object>
            </div>

            <div class="controls">
                <button onclick="connectController()">Connect
                    Controller</button>
                <button onclick="toggleLabels()">Toggle Labels</button>
                <button onclick="toggleChromaKey('green')">Green Screen</button>
                <button onclick="toggleChromaKey('blue')">Blue Screen</button>
                <button onclick="toggleChromaKey('none')">Transparent
                    BG</button>
            </div>

            <div class="info-panel">
                <h3 style="color: #44D62C; margin-top: 0;">Controller Info</h3>
                <div id="controller-info">
                    <p>Press any button on your controller to test...</p>
                </div>
                <div id="buttons-pressed" style="margin-top: 10px;">
                    <strong>Buttons:</strong> <span id="button-list">None</span>
                </div>
                <div id="stick-info" style="margin-top: 10px;">
                    <div class="stick-values"><strong>Left Stick:</strong> <span
                            id="left-stick">X: 0.00, Y: 0.00</span></div>
                    <div class="stick-values"><strong>Right Stick:</strong>
                        <span id="right-stick">X: 0.00, Y: 0.00</span></div>
                </div>
            </div>
        </div>

        <script>
        let controller = null;
        let svgDoc = null;
        let animationFrame = null;
        
        // Wait for SVG to load
        document.getElementById('controller-svg').addEventListener('load', function() {
            svgDoc = this.contentDocument;
            console.log('SVG loaded successfully');
        });
        
        // Gamepad API connection
        window.addEventListener('gamepadconnected', (e) => {
            controller = e.gamepad;
            document.getElementById('status').className = 'status connected';
            document.getElementById('status-text').textContent = `Connected: ${controller.id}`;
            document.getElementById('controller-info').innerHTML = `
                <p><strong>ID:</strong> ${controller.id}</p>
                <p><strong>Buttons:</strong> ${controller.buttons.length}</p>
                <p><strong>Axes:</strong> ${controller.axes.length}</p>
            `;
            startPolling();
        });
        
        window.addEventListener('gamepaddisconnected', (e) => {
            controller = null;
            document.getElementById('status').className = 'status disconnected';
            document.getElementById('status-text').textContent = 'Controller disconnected';
            stopPolling();
        });
        
        function connectController() {
            const gamepads = navigator.getGamepads();
            for (let i = 0; i < gamepads.length; i++) {
                if (gamepads[i]) {
                    controller = gamepads[i];
                    document.getElementById('status').className = 'status connected';
                    document.getElementById('status-text').textContent = `Connected: ${controller.id}`;
                    document.getElementById('controller-info').innerHTML = `
                        <p><strong>ID:</strong> ${controller.id}</p>
                        <p><strong>Buttons:</strong> ${controller.buttons.length}</p>
                        <p><strong>Axes:</strong> ${controller.axes.length}</p>
                    `;
                    startPolling();
                    return;
                }
            }
            alert('No controller detected. Please connect your Razer Wolverine V3 Pro and press any button on it.');
        }
        
        function startPolling() {
            if (!animationFrame) {
                pollGamepad();
            }
        }
        
        function stopPolling() {
            if (animationFrame) {
                cancelAnimationFrame(animationFrame);
                animationFrame = null;
            }
        }
        
        // Button mapping for Xbox-style controllers + Razer paddles
        const buttonMap = {
            0: 'button-a', 1: 'button-b', 2: 'button-x', 3: 'button-y',
            4: 'button-lb', 5: 'button-rb', 6: 'button-lt', 7: 'button-rt',
            8: 'button-view', 9: 'button-menu', 10: 'button-l3', 11: 'button-r3',
            12: 'dpad-up', 13: 'dpad-down', 14: 'dpad-left', 15: 'dpad-right',
            16: 'button-xbox',
            // Razer Wolverine M buttons (back paddles)
            17: 'button-m1', 18: 'button-m2', 19: 'button-m3', 
            20: 'button-m4', 21: 'button-m5', 22: 'button-m6'
        };
        
        const buttonNames = {
            0: 'A', 1: 'B', 2: 'X', 3: 'Y',
            4: 'LB', 5: 'RB', 6: 'LT', 7: 'RT',
            8: 'View', 9: 'Menu', 10: 'L3', 11: 'R3',
            12: 'D-Up', 13: 'D-Down', 14: 'D-Left', 15: 'D-Right',
            16: 'Xbox',
            17: 'M1', 18: 'M2', 19: 'M3', 20: 'M4', 21: 'M5', 22: 'M6'
        };
        
        function pollGamepad() {
            if (!controller) {
                stopPolling();
                return;
            }
            
            // Update controller reference
            const gamepads = navigator.getGamepads();
            controller = gamepads[controller.index];
            
            if (!controller) {
                stopPolling();
                return;
            }
            
            const pressedButtons = [];
            
            // Check buttons
            controller.buttons.forEach((button, index) => {
                const elementId = buttonMap[index];
                if (elementId && svgDoc) {
                    const element = svgDoc.getElementById(elementId);
                    if (element) {
                        if (button.pressed) {
                            element.classList.add('pressed');
                            pressedButtons.push(buttonNames[index] || `Btn${index}`);
                        } else {
                            element.classList.remove('pressed');
                        }
                        
                        // Handle analog triggers
                        if (index === 6 || index === 7) {
                            element.setAttribute('data-pressure', Math.round(button.value * 100));
                        }
                    } else if (button.pressed) {
                        // Debug: element not found
                        console.log(`Element not found: ${elementId} for button ${index}`);
                    }
                } else if (button.pressed && !svgDoc) {
                    // Debug: SVG not loaded
                    console.log('SVG document not loaded yet');
                }
            });
            
            // Update button display
            document.getElementById('button-list').textContent = 
                pressedButtons.length > 0 ? pressedButtons.join(', ') : 'None';
            
            // Handle analog sticks
            const leftX = controller.axes[0] || 0;
            const leftY = controller.axes[1] || 0;
            const rightX = controller.axes[2] || 0;
            const rightY = controller.axes[3] || 0;
            
            // Update stick visuals (new positions for actual controller image)
            if (svgDoc) {
                const leftStick = svgDoc.getElementById('stick-left-indicator');
                const rightStick = svgDoc.getElementById('stick-right-indicator');
                const leftStickRing = svgDoc.querySelector('#stick-left .stick-ring');
                const rightStickRing = svgDoc.querySelector('#stick-right .stick-ring');
                
                if (leftStick) {
                    const baseX = 416;  // Updated to match your positioned buttons
                    const baseY = 366;
                    const moveRange = 40;  // How far the stick can move
                    const newX = baseX + leftX * moveRange;
                    const newY = baseY + leftY * moveRange;
                    leftStick.setAttribute('cx', newX);
                    leftStick.setAttribute('cy', newY);
                    
                    if (Math.abs(leftX) > 0.1 || Math.abs(leftY) > 0.1) {
                        leftStick.classList.add('active', 'moved');
                        if (leftStickRing) leftStickRing.classList.add('active');
                    } else {
                        leftStick.classList.remove('active', 'moved');
                        if (leftStickRing) leftStickRing.classList.remove('active');
                    }
                }
                
                if (rightStick) {
                    const baseX = 929;  // Updated to match your positioned buttons
                    const baseY = 554;
                    const moveRange = 40;
                    const newX = baseX + rightX * moveRange;
                    const newY = baseY + rightY * moveRange;
                    rightStick.setAttribute('cx', newX);
                    rightStick.setAttribute('cy', newY);
                    
                    if (Math.abs(rightX) > 0.1 || Math.abs(rightY) > 0.1) {
                        rightStick.classList.add('active', 'moved');
                        if (rightStickRing) rightStickRing.classList.add('active');
                    } else {
                        rightStick.classList.remove('active', 'moved');
                        if (rightStickRing) rightStickRing.classList.remove('active');
                    }
                }
            }
            
            // Update stick values display
            document.getElementById('left-stick').textContent = 
                `X: ${leftX.toFixed(2)}, Y: ${leftY.toFixed(2)}`;
            document.getElementById('right-stick').textContent = 
                `X: ${rightX.toFixed(2)}, Y: ${rightY.toFixed(2)}`;
            
            animationFrame = requestAnimationFrame(pollGamepad);
        }
        
        function toggleLabels() {
            if (svgDoc) {
                svgDoc.documentElement.classList.toggle('hide-labels');
            }
        }
        
        function toggleChromaKey(color) {
            document.body.className = '';
            if (color === 'green') {
                document.body.classList.add('chroma-green');
            } else if (color === 'blue') {
                document.body.classList.add('chroma-blue');
            }
        }
        
        // Auto-connect if controller already connected
        window.addEventListener('load', () => {
            setTimeout(() => {
                const gamepads = navigator.getGamepads();
                if (gamepads[0]) {
                    connectController();
                }
            }, 500);
        });
    </script>
    </body>
</html>
