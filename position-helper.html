<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Button Position Helper - Razer Wolverine V3 Pro</title>
        <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 300px;
            background: #2d2d2d;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
        }
        
        h1 {
            color: #44D62C;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .instructions {
            background: rgba(68, 214, 44, 0.1);
            border-left: 3px solid #44D62C;
            padding: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            line-height: 1.5;
        }
        
        .button-list {
            list-style: none;
        }
        
        .button-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        
        .button-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .button-item.active {
            background: rgba(68, 214, 44, 0.2);
            border-left-color: #44D62C;
        }
        
        .button-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .button-coords {
            font-size: 11px;
            color: #aaa;
            font-family: 'Courier New', monospace;
        }
        
        .button-size {
            margin-top: 8px;
        }
        
        .button-size label {
            display: block;
            font-size: 11px;
            margin-bottom: 3px;
            color: #aaa;
        }
        
        .button-size input {
            width: 100%;
            padding: 5px;
            background: rgba(0,0,0,0.3);
            border: 1px solid #444;
            color: #fff;
            border-radius: 3px;
        }
        
        .canvas-container {
            flex: 1;
            position: relative;
            overflow: auto;
            background: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #canvas {
            position: relative;
            cursor: crosshair;
        }
        
        .button-overlay-viz {
            position: absolute;
            border: 2px solid #44D62C;
            background: rgba(68, 214, 44, 0.2);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            transition: all 0.2s;
        }
        
        .button-overlay-viz.active {
            border-color: #00FF00;
            background: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
        }
        
        .button-overlay-viz.rect {
            border-radius: 8px;
        }
        
        .button-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 3px #000;
            pointer-events: none;
        }
        
        .controls {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 8px;
            z-index: 10;
        }
        
        .controls button {
            background: #44D62C;
            color: #000;
            border: none;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .controls button:hover {
            background: #7FD157;
            transform: scale(1.05);
        }
        
        .output {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
        }
        
        .output h3 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #44D62C;
        }
        
        .output textarea {
            width: 100%;
            height: 150px;
            background: #000;
            color: #0f0;
            border: 1px solid #444;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            border-radius: 3px;
            resize: vertical;
        }
        
        .copy-btn {
            margin-top: 5px;
            width: 100%;
        }
    </style>
    </head>
    <body>
        <div class="sidebar">
            <h1>🎮 Button Position Helper</h1>

            <div class="instructions">
                <strong>How to use:</strong><br>
                1. Click a button name below<br>
                2. Click on the controller image where that button should be<br>
                3. Adjust the radius/size as needed<br>
                4. Repeat for all buttons<br>
                5. Copy the SVG code when done
            </div>

            <ul class="button-list" id="buttonList"></ul>

            <div class="output">
                <h3>SVG Output</h3>
                <textarea id="svgOutput" readonly></textarea>
                <button class="copy-btn" onclick="copySVG()">Copy SVG
                    Code</button>
            </div>
        </div>

        <div class="canvas-container">
            <div class="controls">
                <button onclick="toggleOverlays()">Toggle Overlays</button>
                <button onclick="resetPositions()">Reset All</button>
                <button onclick="exportJSON()">Export JSON</button>
            </div>
            <div id="canvas">
                <img id="controllerImage" src="Razor Wolverine V3 8k.png"
                    style="display: block; max-width: 100%;">
            </div>
        </div>

        <script>
        const buttons = {
            'button-lt': { name: 'LT (Left Trigger)', x: 185, y: 145, r: 28, shape: 'circle' },
            'button-rt': { name: 'RT (Right Trigger)', x: 615, y: 145, r: 28, shape: 'circle' },
            'button-lb': { name: 'LB (Left Bumper)', x: 185, y: 190, w: 90, h: 30, shape: 'rect' },
            'button-rb': { name: 'RB (Right Bumper)', x: 615, y: 190, w: 90, h: 30, shape: 'rect' },
            'dpad-up': { name: 'D-Pad Up', x: 225, y: 315, r: 20, shape: 'circle' },
            'dpad-down': { name: 'D-Pad Down', x: 225, y: 375, r: 20, shape: 'circle' },
            'dpad-left': { name: 'D-Pad Left', x: 195, y: 345, r: 20, shape: 'circle' },
            'dpad-right': { name: 'D-Pad Right', x: 255, y: 345, r: 20, shape: 'circle' },
            'button-view': { name: 'View Button', x: 355, y: 280, w: 30, h: 20, shape: 'rect' },
            'button-xbox': { name: 'Xbox Button', x: 400, y: 260, r: 22, shape: 'circle' },
            'button-menu': { name: 'Menu Button', x: 445, y: 280, w: 30, h: 20, shape: 'rect' },
            'stick-left-indicator': { name: 'Left Stick', x: 315, y: 385, r: 35, shape: 'circle' },
            'stick-right-indicator': { name: 'Right Stick', x: 470, y: 400, r: 35, shape: 'circle' },
            'button-y': { name: 'Y Button', x: 580, y: 290, r: 22, shape: 'circle' },
            'button-b': { name: 'B Button', x: 620, y: 330, r: 22, shape: 'circle' },
            'button-a': { name: 'A Button', x: 580, y: 370, r: 22, shape: 'circle' },
            'button-x': { name: 'X Button', x: 540, y: 330, r: 22, shape: 'circle' },
            'button-m1': { name: 'M1 Paddle', x: 132, y: 265, w: 25, h: 50, shape: 'rect' },
            'button-m2': { name: 'M2 Paddle', x: 132, y: 335, w: 25, h: 50, shape: 'rect' },
            'button-m3': { name: 'M3 Paddle', x: 668, y: 265, w: 25, h: 50, shape: 'rect' },
            'button-m4': { name: 'M4 Paddle', x: 668, y: 335, w: 25, h: 50, shape: 'rect' },
            'button-m5': { name: 'M5 Paddle', x: 132, y: 405, w: 25, h: 50, shape: 'rect' },
            'button-m6': { name: 'M6 Paddle', x: 668, y: 405, w: 25, h: 50, shape: 'rect' }
        };
        
        let activeButton = null;
        let overlaysVisible = true;
        
        // Create button list
        const buttonList = document.getElementById('buttonList');
        Object.keys(buttons).forEach(id => {
            const btn = buttons[id];
            const li = document.createElement('li');
            li.className = 'button-item';
            li.dataset.id = id;
            li.innerHTML = `
                <div class="button-name">${btn.name}</div>
                <div class="button-coords">x: ${btn.x}, y: ${btn.y}</div>
                <div class="button-size">
                    <label>${btn.shape === 'circle' ? 'Radius:' : 'Width x Height:'}</label>
                    <input type="text" value="${btn.shape === 'circle' ? btn.r : btn.w + ' x ' + btn.h}" 
                           onchange="updateSize('${id}', this.value)">
                </div>
            `;
            li.onclick = () => selectButton(id);
            buttonList.appendChild(li);
        });
        
        // Create overlays
        const canvas = document.getElementById('canvas');
        const img = document.getElementById('controllerImage');
        
        img.onload = function() {
            // Wait a bit for layout to settle, then create overlays
            setTimeout(() => {
                Object.keys(buttons).forEach(id => {
                    createOverlay(id);
                });
                updateSVGOutput();
            }, 100);
        };
        
        function createOverlay(id) {
            const btn = buttons[id];
            const overlay = document.createElement('div');
            overlay.className = 'button-overlay-viz' + (btn.shape === 'rect' ? ' rect' : '');
            overlay.id = 'overlay-' + id;
            
            // Get scale factor
            const rect = img.getBoundingClientRect();
            const scaleX = rect.width / img.naturalWidth;
            const scaleY = rect.height / img.naturalHeight;
            
            // Scale sizes and positions for display
            if (btn.shape === 'circle') {
                const displayRadius = btn.r * scaleX;
                overlay.style.width = (displayRadius * 2) + 'px';
                overlay.style.height = (displayRadius * 2) + 'px';
            } else {
                overlay.style.width = (btn.w * scaleX) + 'px';
                overlay.style.height = (btn.h * scaleY) + 'px';
            }
            
            // Position relative to displayed image
            const canvasRect = canvas.getBoundingClientRect();
            const displayX = btn.x * scaleX + rect.left - canvasRect.left;
            const displayY = btn.y * scaleY + rect.top - canvasRect.top;
            
            overlay.style.left = displayX + 'px';
            overlay.style.top = displayY + 'px';
            
            const label = document.createElement('div');
            label.className = 'button-label';
            label.textContent = btn.name.split(' ')[0];
            overlay.appendChild(label);
            
            canvas.appendChild(overlay);
        }
        
        function selectButton(id) {
            document.querySelectorAll('.button-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.button-overlay-viz').forEach(el => el.classList.remove('active'));
            
            document.querySelector(`[data-id="${id}"]`).classList.add('active');
            document.getElementById('overlay-' + id).classList.add('active');
            
            activeButton = id;
        }
        
        canvas.onclick = function(e) {
            if (!activeButton) {
                alert('Please select a button from the list first!');
                return;
            }
            
            const rect = img.getBoundingClientRect();
            const canvasRect = canvas.getBoundingClientRect();
            
            // Click position relative to the displayed image
            const displayX = e.clientX - rect.left;
            const displayY = e.clientY - rect.top;
            
            // Scale factors between displayed size and natural size
            const scaleX = img.naturalWidth / rect.width;
            const scaleY = img.naturalHeight / rect.height;
            
            // Natural image coordinates (for SVG output)
            const x = Math.round(displayX * scaleX);
            const y = Math.round(displayY * scaleY);
            
            // Store natural coordinates
            buttons[activeButton].x = x;
            buttons[activeButton].y = y;
            
            // Update overlay position using display coordinates
            const overlay = document.getElementById('overlay-' + activeButton);
            const displayScaleX = rect.width / img.naturalWidth;
            const displayScaleY = rect.height / img.naturalHeight;
            
            const overlayX = x * displayScaleX + rect.left - canvasRect.left;
            const overlayY = y * displayScaleY + rect.top - canvasRect.top;
            
            overlay.style.left = overlayX + 'px';
            overlay.style.top = overlayY + 'px';
            
            // Update list item
            const listItem = document.querySelector(`[data-id="${activeButton}"]`);
            listItem.querySelector('.button-coords').textContent = `x: ${x}, y: ${y}`;
            
            updateSVGOutput();
        };
        
        function updateSize(id, value) {
            const btn = buttons[id];
            const overlay = document.getElementById('overlay-' + id);
            
            // Get scale factor
            const rect = img.getBoundingClientRect();
            const scaleX = rect.width / img.naturalWidth;
            const scaleY = rect.height / img.naturalHeight;
            
            if (btn.shape === 'circle') {
                btn.r = parseInt(value) || 20;
                const displayRadius = btn.r * scaleX;
                overlay.style.width = (displayRadius * 2) + 'px';
                overlay.style.height = (displayRadius * 2) + 'px';
            } else {
                const parts = value.split('x').map(v => parseInt(v.trim()));
                btn.w = parts[0] || 30;
                btn.h = parts[1] || 30;
                overlay.style.width = (btn.w * scaleX) + 'px';
                overlay.style.height = (btn.h * scaleY) + 'px';
            }
            
            updateSVGOutput();
        }
        
        function updateSVGOutput() {
            let svg = '<!-- Button Overlays -->\n\n';
            
            Object.keys(buttons).forEach(id => {
                const btn = buttons[id];
                if (btn.shape === 'circle') {
                    svg += `<circle id="${id}" cx="${btn.x}" cy="${btn.y}" r="${btn.r}"\n`;
                    svg += `        fill="rgba(255,255,255,0)" stroke="none"\n`;
                    svg += `        class="button-overlay" data-button="${btn.name}"/>\n\n`;
                } else {
                    const rx = id.includes('button') ? 'rx="4"' : 'rx="5"';
                    svg += `<rect id="${id}" x="${btn.x - btn.w/2}" y="${btn.y - btn.h/2}" width="${btn.w}" height="${btn.h}" ${rx}\n`;
                    svg += `      fill="rgba(255,255,255,0)" stroke="none"\n`;
                    svg += `      class="button-overlay" data-button="${btn.name}"/>\n\n`;
                }
            });
            
            document.getElementById('svgOutput').value = svg;
        }
        
        function copySVG() {
            const output = document.getElementById('svgOutput');
            output.select();
            document.execCommand('copy');
            alert('SVG code copied to clipboard!');
        }
        
        function toggleOverlays() {
            overlaysVisible = !overlaysVisible;
            document.querySelectorAll('.button-overlay-viz').forEach(el => {
                el.style.display = overlaysVisible ? 'block' : 'none';
            });
        }
        
        function resetPositions() {
            if (confirm('Reset all button positions to default?')) {
                location.reload();
            }
        }
        
        function exportJSON() {
            const json = { buttons: buttons };
            const blob = new Blob([JSON.stringify(json, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'button-positions.json';
            a.click();
        }
    </script>
    </body>
</html>
